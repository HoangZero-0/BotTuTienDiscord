name: Deploy to Katabump

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */3 * *" # Tự động chạy mỗi 3 ngày vào lúc 0h00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: � Zip files for deployment
        run: |
          zip -r deploy.zip . -x "*.git*" "*__pycache__*" ".env" "tu_tien.db" ".github*"

      - name: 🚀 Upload and Deploy via API
        run: |
      - name: 🚀 Upload and Deploy via API
        run: |
          # 1. Lấy URL để Upload
          JSON_RES=$(curl -s -X GET "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/upload" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json")
          UPLOAD_URL=$(echo $JSON_RES | jq -r .attributes.url)

          if [ "$UPLOAD_URL" == "null" ] || [ -z "$UPLOAD_URL" ]; then
            echo "❌ LỖI: Không lấy được URL Upload. Kiểm tra API Key và Server ID!"
            echo "Phản hồi từ API: $JSON_RES"
            exit 1
          fi

          # 2. Upload file nén lên server (Sử dụng VERBOSE để xem log chi tiết)
          echo "📤 Đang tải file lên Katabump..."
          curl -v -F "files=@deploy.zip" "$UPLOAD_URL&directory=/"

          # 3. Chờ 3 giây để hệ thống file cập nhật (Safety)
          sleep 3

          # 4. Ra lệnh giải nén (Decompress)
          echo "📦 Đang giải nén file trên máy chủ..."
          DECOMPRESS_RES=$(curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/decompress" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"root\": \"/\", \"file\": \"deploy.zip\"}")
          echo "Kết quả giải nén: $DECOMPRESS_RES"

          # 5. Xóa file zip sau khi giải nén
          curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/delete" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"root\": \"/\", \"files\": [\"deploy.zip\"]}"

      - name: 🔄 Restart Server
        run: |
          curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"signal": "restart"}'
