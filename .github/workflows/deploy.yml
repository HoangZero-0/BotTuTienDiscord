name: Deploy to Katabump

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */3 * *" # Tự động chạy mỗi 3 ngày vào lúc 0h00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Upload to Pterodactyl
        uses: rexlmanu/pterodactyl-upload-action@v2.1
        with:
          panel-host: https://control.katabump.com
          api-key: ${{ secrets.PTERODACTYL_API_KEY }}
          server-id: ${{ secrets.PTERODACTYL_SERVER_ID }}
          source: .
          target: / # Upload thẳng vào thư mục gốc của container

      - name: 🔄 Restart Server
        run: |
          curl -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}'
