name: Deploy to Katabump

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */3 * *" # Tự động chạy mỗi 3 ngày vào lúc 0h00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: � Zip files for deployment
        run: |
          zip -r deploy.zip . -x "*.git*" "*__pycache__*" ".env" "tu_tien.db" ".github*"

      - name: 🚀 Upload and Deploy via API
        run: |
          # 1. Lấy URL để Upload
          UPLOAD_URL=$(curl -s -X GET "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/upload" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Accept: application/json" | jq -r .attributes.url)

          # 2. Upload file nén lên server
          curl -s -F "files=@deploy.zip" "$UPLOAD_URL&directory=/"

          # 3. Ra lệnh giải nén trên server
          curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/decompress" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"root\": \"/\", \"file\": \"deploy.zip\"}"

          # 4. Xóa file zip sau khi giải nén (Dọn dẹp server)
          curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/files/delete" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"root\": \"/\", \"files\": [\"deploy.zip\"]}"

      - name: 🔄 Restart Server
        run: |
          curl -s -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"signal": "restart"}'
