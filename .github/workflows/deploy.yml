name: Deploy to Katabump

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 */3 * *" # Tự động chạy mỗi 3 ngày vào lúc 0h00 UTC

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v3

      - name: 🚀 Upload to Katabump via SFTP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: ${{ secrets.SFTP_PORT }}
          source: "."
          target: "/home/container"
          rm: false # Không xóa file cũ, chỉ ghi đè
          strip_components: 0
          exclude: ".git*,.github*,__pycache__,.env,tu_tien.db"

      - name: 🔄 Restart Server
        run: |
          curl -X POST "https://control.katabump.com/api/client/servers/${{ secrets.PTERODACTYL_SERVER_ID }}/power" \
            -H "Authorization: Bearer ${{ secrets.PTERODACTYL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d '{"signal": "restart"}'
